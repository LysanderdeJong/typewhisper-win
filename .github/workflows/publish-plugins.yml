name: Build and Release Plugin

on:
  push:
    tags:
      - 'plugin-*-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: plugin-release-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Parse tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Extract plugin name and version from tag: plugin-sherpa-onnx-v1.0.0
          if ($tag -match '^plugin-(.+)-v(.+)$') {
            $pluginName = $Matches[1]
            $pluginVersion = $Matches[2]
          } else {
            throw "Invalid tag format: $tag"
          }
          echo "PLUGIN_NAME=$pluginName" >> $env:GITHUB_ENV
          echo "PLUGIN_VERSION=$pluginVersion" >> $env:GITHUB_ENV
          echo "Plugin: $pluginName, Version: $pluginVersion"

      - name: Resolve project path
        shell: pwsh
        run: |
          # Map plugin name to project directory
          $map = @{
            'sherpa-onnx'        = 'TypeWhisper.Plugin.SherpaOnnx'
            'openai'             = 'TypeWhisper.Plugin.OpenAI'
            'openai-compatible'  = 'TypeWhisper.Plugin.OpenAiCompatible'
            'groq'               = 'TypeWhisper.Plugin.Groq'
            'webhook'            = 'TypeWhisper.Plugin.Webhook'
            'deepgram'           = 'TypeWhisper.Plugin.Deepgram'
            'assemblyai'         = 'TypeWhisper.Plugin.AssemblyAi'
            'gemini'             = 'TypeWhisper.Plugin.Gemini'
            'linear'             = 'TypeWhisper.Plugin.Linear'
            'obsidian'           = 'TypeWhisper.Plugin.Obsidian'
            'script'             = 'TypeWhisper.Plugin.Script'
            'live-transcript'    = 'TypeWhisper.Plugin.LiveTranscript'
            'granite-speech'     = 'TypeWhisper.Plugin.GraniteSpeech'
            'gemma-local'        = 'TypeWhisper.Plugin.GemmaLocal'
            'claude'             = 'TypeWhisper.Plugin.Claude'
            'openrouter'         = 'TypeWhisper.Plugin.OpenRouter'
            'cerebras'           = 'TypeWhisper.Plugin.Cerebras'
            'cohere'             = 'TypeWhisper.Plugin.Cohere'
            'fireworks'          = 'TypeWhisper.Plugin.Fireworks'
            'gladia'             = 'TypeWhisper.Plugin.Gladia'
            'speechmatics'       = 'TypeWhisper.Plugin.Speechmatics'
            'soniox'             = 'TypeWhisper.Plugin.Soniox'
            'cloudflare-asr'     = 'TypeWhisper.Plugin.CloudflareAsr'
             'google-cloud-stt'   = 'TypeWhisper.Plugin.GoogleCloudStt'
             'qwen3-stt'          = 'TypeWhisper.Plugin.Qwen3Stt'
             'voxtral'            = 'TypeWhisper.Plugin.Voxtral'
             'whisper-cpp'        = 'TypeWhisper.Plugin.WhisperCpp'
             'file-memory'        = 'TypeWhisper.Plugin.FileMemory'
             'openai-vector-memory' = 'TypeWhisper.Plugin.OpenAiVectorMemory'
           }
          $projectName = $map[$env:PLUGIN_NAME]
          if (-not $projectName) {
            throw "Unknown plugin: $env:PLUGIN_NAME"
          }
          echo "PROJECT_NAME=$projectName" >> $env:GITHUB_ENV
          echo "Project: $projectName"

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Patch manifest version
        shell: pwsh
        run: |
          $manifestPath = "plugins/$env:PROJECT_NAME/manifest.json"
          $manifest = Get-Content $manifestPath | ConvertFrom-Json
          $manifest.version = $env:PLUGIN_VERSION
          $manifest | ConvertTo-Json -Depth 4 | Set-Content $manifestPath
          echo "Patched $manifestPath to version $env:PLUGIN_VERSION"
          Get-Content $manifestPath

      - name: Build Plugin
        shell: pwsh
        run: |
          dotnet build "plugins/$env:PROJECT_NAME/$env:PROJECT_NAME.csproj" -c Release
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }

      - name: Create ZIP
        shell: pwsh
        run: |
          $outputDir = "plugins/$env:PROJECT_NAME/bin/Release/net10.0-windows"
          $manifestPath = "plugins/$env:PROJECT_NAME/manifest.json"
          $manifest = Get-Content $manifestPath | ConvertFrom-Json
          $pluginId = $manifest.id
          $assemblyName = $manifest.assemblyName -replace '\.dll$',''

          # Create staging directory
          $stagingDir = "plugin-staging/$pluginId"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # Copy essential files
          Copy-Item (Join-Path $outputDir "$assemblyName.dll") $stagingDir
          $depsFile = Join-Path $outputDir "$assemblyName.deps.json"
          if (Test-Path $depsFile) { Copy-Item $depsFile $stagingDir }
          Copy-Item $manifestPath $stagingDir

          # Copy Localization folder if present
          $locDir = "plugins/$env:PROJECT_NAME/Localization"
          if (Test-Path $locDir) {
            Copy-Item -Path $locDir -Destination "$stagingDir/Localization" -Recurse
          }

          # Copy NuGet dependency DLLs (excluding SDK/framework assemblies)
          $excludeAssemblies = @('TypeWhisper.PluginSDK.dll')
          Get-ChildItem -Path $outputDir -Filter '*.dll' | Where-Object {
            $_.Name -ne "$assemblyName.dll" -and $_.Name -notin $excludeAssemblies
          } | ForEach-Object {
            Copy-Item $_.FullName $stagingDir
            Write-Host "  Included dependency: $($_.Name)"
          }

          # Copy native runtime directories (e.g. runtimes/win-x64/native/)
          $runtimesDir = Join-Path $outputDir 'runtimes'
          if (Test-Path $runtimesDir) {
            Copy-Item -Path $runtimesDir -Destination "$stagingDir/runtimes" -Recurse
            Write-Host "  Included native runtimes"
          }

          # Create ZIP
          $zipName = "$pluginId-$env:PLUGIN_VERSION.zip"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force
          $zipSize = (Get-Item $zipName).Length
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "ZIP_SIZE=$zipSize" >> $env:GITHUB_ENV
          echo "PLUGIN_ID=$pluginId" >> $env:GITHUB_ENV
          echo "Created $zipName ($zipSize bytes)"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag $env:ZIP_NAME `
            --title "$env:PROJECT_NAME v$env:PLUGIN_VERSION" `
            --notes ""

      - name: Update plugins.json on registry release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$env:ZIP_NAME"

          gh release view registry *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create registry --title "Registry" --notes "Machine-managed registry assets."
          }

          $registryDir = "registry-assets"
          New-Item -ItemType Directory -Path $registryDir -Force | Out-Null
          $registryPath = Join-Path $registryDir "plugins.json"

          gh release download registry -p "plugins.json" -D $registryDir 2>$null
          if ($LASTEXITCODE -eq 0) {
            $registry = @(Get-Content $registryPath | ConvertFrom-Json)
          } else {
            $registry = @()
          }

          $manifestPath = "plugins/$env:PROJECT_NAME/manifest.json"
          $manifest = Get-Content $manifestPath | ConvertFrom-Json

          $entry = [ordered]@{
            id = $manifest.id
            name = $manifest.name
            version = $env:PLUGIN_VERSION
            minHostVersion = $manifest.minHostVersion
            author = $manifest.author
            description = $manifest.description
            category = $manifest.category
            size = [long]$env:ZIP_SIZE
            downloadUrl = $downloadUrl
            requiresApiKey = $false
          }

          $updated = $false
          for ($i = 0; $i -lt $registry.Count; $i++) {
            if ($registry[$i].id -eq $env:PLUGIN_ID) {
              $registry[$i] = $entry
              $updated = $true
              break
            }
          }

          if (-not $updated) {
            $registry += [pscustomobject]$entry
          }

          $registry | ConvertTo-Json -Depth 4 | Set-Content $registryPath
          gh release upload registry $registryPath --clobber
          Write-Host "Uploaded plugins.json to registry release"
